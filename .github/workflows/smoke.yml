name: Root Smoke Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt

      - name: Static compile smoke
        run: |
          python -m py_compile main.py
          find core -name "*.py" -print0 | xargs -0 -I{} python -m py_compile {}

      - name: Runtime smoke (deterministic demo)
        run: python main.py --demo-seconds 2 --no-clear
