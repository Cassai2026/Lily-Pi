version: "3.9"

# Enki AI — Sovereign Stack
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up backend          # Python backend only
#   docker compose up hud              # Sovereign HUD only
#
# Environment:
#   Copy .env.template to .env and fill in your values before starting.
#   Docker Compose will automatically load variables from .env.

services:

  # ── Python Backend (Flask REST API) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: enki-ai-backend
    container_name: enki_backend
    env_file: .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "5000"
      DB_PATH: "/app/data/form_submissions.db"
      MEMORY_DB_PATH: "/app/data/enki_memory.db"
    ports:
      - "5000:5000"
    volumes:
      - enki_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Sovereign HUD (FastAPI + WebSocket) ────────────────────────────────────
  hud:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: enki-ai-backend
    container_name: enki_hud
    env_file: .env
    environment:
      HUD_PORT: "7777"
    ports:
      - "7777:7777"
    volumes:
      - enki_data:/app/data
    command: ["python", "-m", "enki_ai.gui.hud_server", "--no-browser"]
    restart: unless-stopped

  # ── Vite / React Frontend (Electron companion web UI) ──────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: enki-ai-frontend
    container_name: enki_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
      - VITE_HUD_URL=ws://hud:7777
    depends_on:
      - backend
      - hud
    restart: unless-stopped

volumes:
  enki_data:
    driver: local
