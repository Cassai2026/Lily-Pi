<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genesis Mobile | Sovereign HUD</title>
    <style>
        :root {
            --matrix: #00FF41;
            --sovereign: #B22222;
            --gold: #D4AF37;
            --bg: #050505;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--matrix);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- THE MATRIX ENGINE --- */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.25;
        }

        /* --- THE HUD FRAME --- */
        .hud-frame {
            position: relative; z-index: 10;
            height: 100%; display: flex; flex-direction: column;
            padding: 20px;
            border: 2px solid var(--sovereign);
            box-shadow: inset 0 0 20px rgba(178, 34, 34, 0.5), 0 0 15px var(--sovereign);
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        header {
            text-align: center; border-bottom: 1px solid var(--matrix);
            padding-bottom: 10px; margin-bottom: 20px;
            text-shadow: 0 0 8px var(--matrix);
        }

        .system-stats {
            display: flex; justify-content: space-between;
            font-size: 0.65rem; color: var(--gold); margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 1px;
        }

       /* --- UPDATED DATA VIEWPORT --- */
        .viewport {
            flex: 1; 
            border: 1px solid #222;
            /* Using the RAW bypass link to ensure mobile visibility */
            background-image: url('https://raw.githubusercontent.com/CassAi-Global/CassAi-Global-Genesis-OS/main/soverer.jpg');
            background-size: cover; /* Changed from contain to cover so it fills the phone screen */
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(1) sepia(1) hue-rotate(80deg) brightness(1.4) contrast(1.2);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px #000;
        }

        .viewport::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 255, 65, 0.05) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        /* --- THE TACTICAL GRID --- */
        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .nav-item {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--matrix);
            color: var(--matrix);
            padding: 18px 5px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .nav-item:active {
            background: var(--matrix);
            color: #000;
            transform: scale(0.95);
        }

        /* --- LOG FEED --- */
        .terminal-log {
            height: 60px; font-size: 0.6rem; 
            background: rgba(0,0,0,0.5); border-left: 2px solid var(--gold);
            padding: 8px; margin-top: 15px; overflow: hidden;
        }

        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--matrix); opacity: 0.3;
            top: 0; animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="hud-frame">
        <header>
            <h2 style="margin:0; letter-spacing: 4px;">GENESIS MOBILE</h2>
            <div style="font-size: 0.5rem; color: var(--gold);">// ARCHITECT_LINK_ESTABLISHED //</div>
        </header>

        <div class="system-stats">
            <span>SIG: 100G_MESH</span>
            <span id="timer">00:00:00</span>
            <span style="color: var(--matrix);">PEERS: 03</span>
        </div>

        <div class="viewport">
            <div class="scan-line"></div>
            <div style="position:absolute; top:5px; left:5px; font-size:0.5rem; color:var(--gold);">[ 15_PILLAR_MAP_ACTIVE ]</div>
        </div>

        <div class="nav-grid">
            <a href="https://cassai-global.github.io/CassAi-Global-Genesis-OS/roi.html" class="nav-item">ROI_PULSE</a>
            <a href="https://cassai-global.github.io/CassAi-Global-Genesis-OS/university.html" class="nav-item">EDU_NET</a>
            <a href="https://cassai-global.github.io/CassAi-Global-Genesis-OS/odin.html" class="nav-item">ODIN_LAB</a>
            <a href="https://cassai-global.github.io/CassAi-Global-Genesis-OS/hekete.html" class="nav-item">AUDIT_X</a>
        </div>

        <div class="terminal-log" id="log">
            <div>> Handshaking with Stretford Node...</div>
            <div style="color:var(--gold)">> Sovereign Ledger Syncing...</div>
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "1010101010101010";
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // Clock
        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Log Spammer
        const log = document.getElementById('log');
        const msgs = ["> Mesh Packet Received.", "> Heartbeat Stable.", "> ROI Recalculating...", "> Ghost ID Stealth: ON"];
        setInterval(() => {
            const d = document.createElement('div');
            d.innerText = msgs[Math.floor(Math.random()*msgs.length)];
            log.appendChild(d);
            if(log.childNodes.length > 5) log.removeChild(log.firstChild);
        }, 3000);
    </script>
</body>
</html>
